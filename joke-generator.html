<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <style>
        body {
            font-family: 'Unbounded', sans-serif;
            background-color: #f5f2eb;
            color: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            color: #e8390e;
        }
        #joke {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        #refresh {
            background-color: #e8390e;
            color: #f5f2eb;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        #refresh:hover {
            background-color: #cf320e;
        }
    </style>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <div id="joke">Press the button for a joke!</div>
    <button id="refresh">Get a Joke</button>

    <script>
        const jokeElement = document.getElementById('joke');
        const refreshButton = document.getElementById('refresh');

        async function fetchJoke() {
            const response = await fetch('https://v2.jokeapi.dev/joke/Any');
            if (!response.ok) {
                jokeElement.innerText = 'Failed to fetch a joke.';
                return;
            }
            const data = await response.json();
            if (data.type === 'single') {
                jokeElement.innerText = data.joke;
            } else {
                jokeElement.innerText = `${data.setup} \n ${data.delivery}`;
            }
        }

        refreshButton.addEventListener('click', fetchJoke);

        // Fetch a joke when the page loads
        fetchJoke();
    </script>
</body>
</html>
